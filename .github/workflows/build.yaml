name: Build

on:
  push:
    branches:
      - main
  release:
    types:
      - published
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Build
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create hermetic build directories
        run: mkdir -p .go/compiler .go/pkg/mod

      - name: Get release tag
        if: github.event_name == 'release'
        run: echo "RELEASE_TAG=${GITHUB_REF#refs/*/}" >> $GITHUB_ENV

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push PR
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          target: runtime-ubuntu
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/castai/dcgm-exporter:${{ github.sha }}
          build-args: |
            VERSION=${{ github.sha }}
            GOLANG_VERSION=1.26.2

      - name: Build and push main
        if: github.event_name == 'push'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          target: runtime-ubuntu
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/castai/dcgm-exporter:${{ github.sha }}
          build-args: |
            VERSION=${{ github.sha }}
            GOLANG_VERSION=1.26.2

      - name: Build and push release
        if: github.event_name == 'release'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          target: runtime-ubuntu
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/castai/dcgm-exporter:${{ env.RELEASE_TAG }}
            ghcr.io/castai/dcgm-exporter:latest
          build-args: |
            VERSION=${{ env.RELEASE_TAG }}
            GOLANG_VERSION=1.26.2
